<canvas id="shader-bg" aria-hidden="true"></canvas>
<script>
(function(){
  const canvas = document.getElementById('shader-bg');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  // Honor prefers-reduced-motion: bail before WebGL init so the static CSS gradient takes over.
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    canvas.style.display = 'none';
    return;
  }
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);
  const vsSrc = `attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos,0.0,1.0); }`;
  const fsSrc = `
    precision highp float;
    uniform float u_time;
    uniform vec2  u_res;
    vec3 C1 = vec3(0.337, 0.024, 1.000);
    vec3 C2 = vec3(0.482, 0.173, 0.749);
    vec3 C3 = vec3(0.000, 0.000, 0.000);
    void main() {
      vec2 uv = gl_FragCoord.xy / u_res;
      float angle = radians(235.0);
      mat2 rot = mat2(cos(angle), -sin(angle), sin(angle), cos(angle));
      vec2 st = rot * (uv - 0.5) + 0.5;
      st += vec2(-0.5, 0.1);
      float t = u_time * 0.1;
      float freq = 5.5; float strength = 2.4; float density = 1.1;
      float w1 = sin(st.x * freq * density + t) * 0.5 + 0.5;
      float w2 = sin(st.y * freq * density * 0.7 - t * 0.8 + 1.2) * 0.5 + 0.5;
      float w3 = sin((st.x + st.y) * freq * 0.6 + t * 0.5 + 2.1) * 0.5 + 0.5;
      float w4 = sin((st.x - st.y) * freq * 0.4 - t * 0.3 + 3.7) * 0.5 + 0.5;
      float field = w1 * 0.35 + w2 * 0.25 + w3 * 0.25 + w4 * 0.15;
      float warped = field + sin(field * 6.28318 * strength * 0.15 + t * 0.4) * 0.12;
      warped = clamp(warped, 0.0, 1.0);
      float xGrad = smoothstep(0.0, 1.0, uv.x);
      vec3 col = mix(C3, C1, smoothstep(0.15, 0.55, warped));
      col = mix(col, C2, smoothstep(0.4, 0.85, warped));
      col = mix(col, C1, (1.0 - xGrad) * 0.4);
      col = mix(col, C2, xGrad * 0.4);
      float dark = (1.0 - smoothstep(0.2, 0.5, warped)) * (1.0 - smoothstep(0.2, 0.8, xGrad));
      col = mix(col, C3, dark * 0.8);
      col *= 1.1;
      col += vec3(warped * 0.04);
      col = clamp(col, 0.0, 1.0);
      gl_FragColor = vec4(col, 1.0);
    }`;
  function compile(type, src){
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    return sh;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, vsSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes  = gl.getUniformLocation(prog, 'u_res');
  const start = performance.now();
  function draw(){
    gl.uniform1f(uTime, (performance.now() - start) / 1000);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
