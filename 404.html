*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {

}
.rule {

  height: 1px;

}
.suggested {

  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;

.suggested a::after { content: '→'; font-size: 13px; transition: transform 0.4s cubic-bezier(0.25,1,0.5,1); }
.suggested a:hover {

  border-color: rgba(244, 239, 230, 0.5);

  box-shadow: 0 0 0 1px rgba(168, 85, 247, 0.15);

.suggested a:hover::after { transform: translateX(6px); }
